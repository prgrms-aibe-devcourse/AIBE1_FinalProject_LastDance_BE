version: "3.8"

services:
  blue-app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-blue-app
    ports:
      - "8080:8080"          # 호스트 8080 → 컨테이너 8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080     #  앱 내부 포트 지정
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75   # 힙≈380 MB
      #  향후 새로운 환경 변수 추가 시 여기에 이름만 추가해야 합니다.
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
      - JWT_SECRET_KEY
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - KAKAO_CLIENT_ID
      - KAKAO_CLIENT_SECRET
      - NAVER_CLIENT_ID
      - NAVER_CLIENT_SECRET
      - GOOGLE_GEMINI_KEY
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - AWS_S3_BUCKET_NAME
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - GOOGLE_EMAIL
      - GOOGLE_MAIL_PASSWORD
      - GOOGLE_NAME
      - NAVER_EMAIL
      - NAVER_MAIL_PASSWORD
      - NAVER_NAME
      - YOUTH_API_KEY

    deploy:
      resources:
        limits:
          memory: 700m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - shared-app-monitor-network

  green-app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-green-app
    ports:
      - "8081:8081"          # 호스트 8081 → 컨테이너 8081
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081     #
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75   # 힙≈380 MB
      #  향후 새로운 환경 변수 추가 시 여기에 이름만 추가해야 합니다.
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
      - JWT_SECRET_KEY
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - KAKAO_CLIENT_ID
      - KAKAO_CLIENT_SECRET
      - NAVER_CLIENT_ID
      - NAVER_CLIENT_SECRET
      - GOOGLE_GEMINI_KEY
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - AWS_S3_BUCKET_NAME
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - GOOGLE_EMAIL
      - GOOGLE_MAIL_PASSWORD
      - GOOGLE_NAME
      - NAVER_EMAIL
      - NAVER_MAIL_PASSWORD
      - NAVER_NAME
      - YOUTH_API_KEY

    deploy:
      resources:
        limits:
          memory: 700m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - shared-app-monitor-network

# 공유할 외부 네트워크 정의
networks:
  shared-app-monitor-network:
    external: true
    name: app-monitor-network