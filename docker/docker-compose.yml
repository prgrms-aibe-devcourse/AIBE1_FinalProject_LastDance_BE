version: "3.8"

services:
  blue_app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-blue-app
    ports:
      - "8080:8080"          # 호스트 8080 → 컨테이너 8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080     #  앱 내부 포트 지정
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75   # 힙≈380 MB
      #  향후 새로운 환경 변수 추가 시 여기에 이름만 추가해야 합니다.
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
      - JWT_SECRET_KEY

    deploy:
      resources:
        limits:
          memory: 512m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  green_app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-green-app
    ports:
      - "8081:8081"          # 호스트 8081 → 컨테이너 8081
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081     #
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75   # 힙≈380 MB
      #  향후 새로운 환경 변수 추가 시 여기에 이름만 추가해야 합니다.
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
      - JWT_SECRET_KEY

    deploy:
      resources:
        limits:
          memory: 512m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
