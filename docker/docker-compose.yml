version: '3.8'

services:
  blue_app:
    # ECR에서 풀(pull)할 Docker 이미지 경로를 명시
    # 이 경로는 GitHub Actions에서 ECR에 푸시한 이미지 이름과 태그를 사용합니다.
    image: 495264909330.dkr.ecr.ap-northeast-2.amazonaws.com/lastdance-ecr:latest # <-- 여기에 여러분의 ECR URI 및 리포지토리 이름, 태그를 입력
    container_name: lastdance-blue-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  green_app:
    # ECR에서 풀(pull)할 Docker 이미지 경로를 명시
    image: 495264909330.dkr.ecr.ap-northeast-2.amazonaws.com/lastdance-ecr:latest # <-- 여기에 여러분의 ECR URI 및 리포지토리 이름, 태그를 입력
    container_name: lastdance-green-app
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped