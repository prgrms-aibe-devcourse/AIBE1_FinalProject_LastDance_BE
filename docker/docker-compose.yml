version: "3.8"

services:
  blue_app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-blue-app
    ports:
      - "8080:8080"          # 호스트 8080 → 컨테이너 8080
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080     # ❗ 앱 내부 포트 지정
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  green_app:
    image: ${IMAGE_URI:-latest}
    container_name: lastdance-green-app
    ports:
      - "8081:8081"          # 호스트 8081 → 컨테이너 8081
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081     # ❗
      - DB_URL
      - DB_USERNAME
      - DB_PASSWORD
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
