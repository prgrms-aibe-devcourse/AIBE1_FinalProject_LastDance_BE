version: '3.8'

services:
  blue_app:
    build:
      context: ../ # Dockerfile이 위치한 곳의 부모 디렉토리 (프로젝트 루트)를 빌드 컨텍스트로 지정
      dockerfile: docker/Dockerfile # Dockerfile은 현재 폴더 (docker)에 있으므로 경로 변경 없음
    container_name: lastdance-blue-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"] # /actuator/health 엔드포인트 사용
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  green_app:
    build:
      context: ../ # Dockerfile이 위치한 곳의 부모 디렉토리 (프로젝트 루트)를 빌드 컨텍스트로 지정
      dockerfile: docker/Dockerfile # Dockerfile은 현재 폴더 (docker)에 있으므로 경로 변경 없음
    container_name: lastdance-green-app
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"] # /actuator/health 엔드포인트 사용
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped