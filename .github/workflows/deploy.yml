name: CI/CD Pipeline to EC2 with Blue/Green

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때 워크플로우 실행
      - dev  # dev 브랜치에 푸시될 때도 워크플로우 실행

env:
  PROJECT_NAME: lastdance-app # EC2 인스턴스에서 프로젝트 파일을 둘 디렉토리 이름
  AWS_REGION: ap-northeast-2 # 여러분의 AWS 리전 (예: ap-northeast-2)
  ECR_REPOSITORY: lastdance-ecr # ECR에서 생성한 Repository 이름

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # GitHub Actions 러너 환경

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Gradle 권한 부여 (로컬 빌드용. EC2로 복사되지 않으므로 사실상 여기만 필요)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Spring Boot 애플리케이션 빌드
      - name: Build Spring Boot Application
        run: ./gradlew clean build -x test

      # 5. AWS Credentials 설정 (ECR 푸시를 위한 러너 인증)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6. ECR 로그인 (Docker 클라이언트가 ECR에 푸시할 수 있도록 러너에서 로그인)
      - name: Login to Amazon ECR
        id: login-ecr # 이 스텝의 출력을 참조하기 위한 ID
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker 이미지 빌드 및 ECR에 푸시
      - name: Build and Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }} # ECR 로그인 스텝에서 레지스트리 URI 가져오기
          IMAGE_TAG: latest # 또는 github.run_id 등을 사용하여 고유 태그 부여 가능
        run: |
          # 프로젝트 루트(.)를 빌드 컨텍스트로, Dockerfile은 docker/Dockerfile 경로에 있음을 명시
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG -f docker/Dockerfile .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      # 8. EC2 인스턴스에 SSH로 접속하여 배포 스크립트 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true # 스크립트 실패 시 액션 중단
          # ---------- ① 전송할 로컬(러너) 파일 지정 ----------
          source: |
            docker/ # docker-compose.yml이 들어있는 폴더
            deploy.sh
          target: /home/ubuntu/${{ env.PROJECT_NAME }} # EC2 인스턴스 내 파일이 전송될 경로

          # ---------- ② EC2 내부에서 실행할 스크립트 ----------
          script: |
            set -e # 명령어 실패 시 즉시 스크립트 중단

            # EC2 내 프로젝트 디렉토리로 이동 (target 경로가 이미 생성되어 있음)
            cd /home/ubuntu/${{ env.PROJECT_NAME }}

            echo "[EC2] 배포 시작: $(date)"

            # ECR 로그인 (EC2 인스턴스가 직접 ECR에서 이미지를 풀(pull)하기 위함)
            # AWS CLI는 EC2 IAM Role을 통해 인증됨
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} || { echo "[EC2] ECR 로그인 실패!"; exit 1; }

            # 최신 이미지 풀 (ECR에서 가져올 이미지 경로를 직접 지정)
            IMAGE_TO_PULL="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
            echo "[EC2] Docker 이미지 풀: $IMAGE_TO_PULL"
            docker pull $IMAGE_TO_PULL || { echo "[EC2] Docker 이미지 풀 실패!"; exit 1; }

            # 배포 스크립트 실행 권한 부여
            chmod +x deploy.sh

            # 배포 스크립트 실행 (ECR 이미지 정보는 이제 deploy.sh 내에서 사용되지 않음)
            # deploy.sh는 이제 이미지가 풀된 상태임을 가정하고 Nginx 전환만 담당합니다.
            ./deploy.sh || { echo "[EC2] deploy.sh 스크립트 실행 실패!"; exit 1; }

            echo "[EC2] 배포 종료: $(date)"