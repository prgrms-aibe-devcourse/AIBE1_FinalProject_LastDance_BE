name: CI/CD Pipeline to EC2 with Blue/Green

on:
  push:
    branches: [main, dev, chore/setup-full-monitoring]

# ───────────────────────────────────────────────────────────────
concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true
# ───────────────────────────────────────────────────────────────
env:
  PROJECT_NAME: lastdance-app
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: lastdance-ecr
# ───────────────────────────────────────────────────────────────
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        name: Checkout Source Code

      # 2. JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew 실행 권한
      - run: chmod +x gradlew
        name: Grant execute permission for gradlew

      # 4. Build (테스트 제외)
      - run: ./gradlew clean build -x test
        name: Build Spring Boot Application

      # 5. AWS 자격 증명 (러너 → ECR 푸시)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6. 러너에서 ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker 이미지 빌드 & 푸시 (latest + SHA)
      - name: Build and Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
          UNIQUE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG \
                       -f docker/Dockerfile .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG

      # 8-A. 파일 전송 (SCP)
      - name: DEBUG – verify workspace paths
        run: |
          echo "root listing"; ls -al
          ls -al docker || true
          ls -al deploy.sh || true
          ls -al monitoring || true
          

      - name: Copy deploy assets to EC2
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker,deploy.sh,monitoring"      # ← 콤마 구분
          target: /home/ubuntu/${{ env.PROJECT_NAME }}
          debug: true                     # 확인 끝나면 false


        # 8-B. 원격 배포 (SSH)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs_format: exports
          script_stop: true
          envs: | # deploy.sh 스크립트가 사용할 모든 환경 변수들을 명시적으로 전달합니다.
            # ECR 및 이미지 관련 환경 변수 (이전 스텝에서 얻은 값)
            ECR_URI=${{ steps.login-ecr.outputs.registry }}
            ECR_REPO=${{ env.ECR_REPOSITORY }}
            AWS_REGION=${{ env.AWS_REGION }}
            IMAGE_TAG=${{ github.sha }}
            
            # 앱 관련 Secrets
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            
            # 모니터링 관련 Secrets (Grafana 비밀번호)
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}

          script: |
            set -e
            cd /home/ubuntu/${{ env.PROJECT_NAME }}
#            echo "[DEBUG] env 확인"; env | grep -E 'DB_|ECR_|JWT_SECRET_KEY|CLIENT_ID'

            chmod +x deploy.sh
            ./deploy.sh
