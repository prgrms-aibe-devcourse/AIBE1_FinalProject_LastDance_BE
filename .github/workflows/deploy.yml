# .github/workflows/deploy.yml
name: CI/CD Pipeline to EC2 with Blue/Green

on:
  push:
    branches: [main, dev, ci/docker]

concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true

env:
  PROJECT_NAME: lastdance-app
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: lastdance-ecr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ───────────── 1. 코드 / 빌드 / 이미지 푸시 ─────────────
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot Application
        run: ./gradlew clean build -x test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    latest
          UNIQUE_TAG:   ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG \
                       -f docker/Dockerfile .
          docker push  $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push  $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG

      # ───────────── 2. EC2 복사 + 배포 ─────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:          ${{ secrets.EC2_HOST }}
          username:      ${{ secrets.EC2_USERNAME }}
          key:           ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop:   true
          source: |            # 복사할 항목
            deploy.sh
            docker
          target: /home/ubuntu/${{ env.PROJECT_NAME }}
          script: |
            set -e
            cd /home/ubuntu/${{ env.PROJECT_NAME }}
            
            echo "[EC2] .env 생성"
            echo "DB_URL=${{ secrets.DB_URL }}"            >  docker/.env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> docker/.env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> docker/.env
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" >> docker/.env
            ls -al docker/.env
            
            echo "[EC2] ECR 로그인"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
            echo "[EC2] Docker 이미지 pull → $IMAGE_URI"
            docker pull "$IMAGE_URI"
            
            echo "[EC2] deploy.sh 실행"
            chmod +x deploy.sh
            IMAGE_URI="$IMAGE_URI" ./deploy.sh
            
            echo "[EC2] 배포 종료: $(date)"
