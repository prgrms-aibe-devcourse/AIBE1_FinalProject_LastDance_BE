# monitoring/prometheus/prometheus.yml
# Prometheus 설정 파일

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093'] #  Alertmanager 컨테이너 서비스 이름 사용

rule_files:
  - "alert.rules" # 알림 규칙 정의 파일을 로드

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'spring-boot-blue-app-prod'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['blue-app:8080'] #  Docker Compose 서비스 이름과 포트

  - job_name: 'spring-boot-green-app-prod'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['green-app:8081'] #  Docker Compose 서비스 이름과 포트

  # Grafana 메트릭 (선택 사항)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Loki 메트릭 (선택 사항)
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Promtail 메트릭 (선택 사항)
  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
