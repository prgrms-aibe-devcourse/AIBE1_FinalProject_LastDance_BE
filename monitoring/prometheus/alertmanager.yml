# monitoring/prometheus/alertmanager.yml
# Prometheus Alertmanager 설정 파일 (channel 필드 제거)

route:
  group_by: ['alertname', 'instance'] # 같은 alertname과 instance를 가진 알림 그룹화
  group_wait: 30s # 그룹화된 알림을 보내기 전 대기 시간
  group_interval: 5m # 같은 그룹의 알림을 다시 보내기 전 대기 시간
  repeat_interval: 1h # 이미 발송된 알림을 다시 보내기 전 대기 시간
  receiver: 'slack-notifications' # 기본 알림 수신자 설정

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#alerts'                   # 실제 전송할 채널
        api_url: '${SLACK_WEBHOOK_URL}'
        send_resolved: true
        # ─── 제목: Alertmanager 기본 템플릿 사용
        title: '{{ template "slack.default.title" . }}'
        # ─── 필드: 핵심 라벨(Instance, Severity 등)
        fields:
          - title: "Instance"
            value: '{{ .CommonLabels.instance }}'
            short: true
          - title: "Severity"
            value: '{{ .CommonLabels.severity }}'
            short: true
        # ─── 본문: 각 Alert의 summary/description 표시
        text: |
          {{ range .Alerts }}
          • *{{ .Annotations.summary }}*
            {{ .Annotations.description }}
          {{ end }}


# Inhibit rules: 특정 알림이 발생했을 때 다른 알림을 억제 (선택 사항)
# - target_match:
#     severity: 'info'
#   source_match:
#     severity: 'critical'
#   equal: ['alertname', 'instance']

