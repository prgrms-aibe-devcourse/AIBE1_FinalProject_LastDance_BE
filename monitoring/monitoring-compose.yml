# monitoring/monitoring-compose.yml
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090" # 호스트 9090 포트를 Prometheus 9090 포트에 매핑
    volumes:
      - ./prometheus:/etc/prometheus # Prometheus 설정 파일 마운트 (상대 경로)
      - prometheus_data:/prometheus # Prometheus 데이터 저장 볼륨
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared-app-monitor-network # 이 서비스가 사용할 로컬 모니터링 네트워크

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # 호스트 3000 포트를 Grafana 3000 포트에 매핑
    volumes:
      - grafana_data:/var/lib/grafana # Grafana 데이터 저장 볼륨 (대시보드, 데이터 소스 등)
    environment:
      - GF_SECURITY_ADMIN_USER=admin # Grafana 초기 관리자 사용자 이름
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD} # 로컬 테스트용 비밀번호
      # 배포 환경에서는 GitHub Secret에서 주입받을 것임
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared-app-monitor-network # 이 서비스도 동일 네트워크에 연결

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100" # 호스트 9100 포트를 Node Exporter 9100 포트에 매핑
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared-app-monitor-network # Node Exporter도 이 네트워크에 연결

  loki:
    image: grafana/loki:3.0.3
    container_name: loki
    ports:
      - "3100:3100" # Loki의 HTTP API 포트 (Promtail과 Grafana에서 접근)
    volumes:
      - ./loki:/etc/loki # Loki 설정 파일 마운트
      - loki_data:/loki # Loki 데이터 볼륨 (WAL, 인덱스 등. S3로 전송되기 전)
    command: -config.file=/etc/loki/config.yml # Loki 컨테이너 시작 시 설정 파일 지정
    restart: unless-stopped
    networks:
      - shared-app-monitor-network # 공유 네트워크 사용

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - ./promtail:/etc/promtail # Promtail 설정 파일 마운트
      - /var/log:/var/log:ro # 호스트 시스템 로그 디렉토리 마운트 (선택 사항, 필요시)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml # Promtail 컨테이너 시작 시 설정 파일 지정
    restart: unless-stopped
    networks:
      - shared-app-monitor-network # 공유 네트워크 사용

volumes:
  prometheus_data: # Prometheus 데이터를 위한 명명된 볼륨
  grafana_data:    # Grafana 데이터를 위한 명명된 볼륨
  loki_data:       # Loki 데이터를 위한 명명된 볼륨(Docker가 관리)

networks:
  shared-app-monitor-network: # ⭐ 로컬에서 사용할 Docker 네트워크 정의
    external: true
    name: app-monitor-network