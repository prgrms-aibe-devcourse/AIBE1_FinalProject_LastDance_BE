# monitoring/monitoring-compose.yml
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090" # 호스트 9090 포트를 Prometheus 9090 포트에 매핑
    volumes:
      - ./prometheus:/etc/prometheus # Prometheus 설정 파일 마운트 (상대 경로)
      - prometheus_data:/prometheus # Prometheus 데이터 저장 볼륨
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared_app_monitor_network # 이 서비스가 사용할 로컬 모니터링 네트워크

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # 호스트 3000 포트를 Grafana 3000 포트에 매핑
    volumes:
      - grafana_data:/var/lib/grafana # Grafana 데이터 저장 볼륨 (대시보드, 데이터 소스 등)
    environment:
      - GF_SECURITY_ADMIN_USER=admin # Grafana 초기 관리자 사용자 이름
      - GF_SECURITY_ADMIN_PASSWORD=1234 # 로컬 테스트용 비밀번호
      # 배포 환경에서는 GitHub Secret에서 주입받을 것임
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared_app_monitor_network # 이 서비스도 동일 네트워크에 연결

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100" # 호스트 9100 포트를 Node Exporter 9100 포트에 매핑
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped # 컨테이너 비정상 종료 시 재시작
    networks:
      - shared_app_monitor_network # Node Exporter도 이 네트워크에 연결

volumes:
  prometheus_data: # Prometheus 데이터를 위한 명명된 볼륨
  grafana_data:    # Grafana 데이터를 위한 명명된 볼륨

networks:
  shared_app_monitor_network: # ⭐ 로컬에서 사용할 Docker 네트워크 정의
    driver: bridge # 기본 브릿지 드라이버 사용
    external: true
    name: app_monitor_network