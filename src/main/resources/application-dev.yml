spring:
  jpa:
    hibernate:
      ddl-auto: none # 배포 시는 none 또는 validate 추천
    #      ddl-auto: update
    properties:
      hibernate:
        #        dialect: org.hibernate.dialect.MySQL8Dialect # MySQL
        dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL
        show_sql: true
        format_sql: true
  # 데이터소스
  datasource:
    #    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL
    driver-class-name: org.postgresql.Driver # PostgreSQL
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      # 개발 편의성을 위한 설정
      maximum-pool-size: 10         # 여유롭게 10개로 설정
      minimum-idle: 3               # 최소 3개 유지
      connection-timeout: 30000
      idle-timeout: 600000          # 10분
      max-lifetime: 1800000         # 30분

      # 개발 중 디버깅용
      leak-detection-threshold: 180000  # 3분으로 여유롭게

  security:
    oauth2:
      client:
        registration:
          # --- Google 설정 ---
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          # --- Kakao 설정 ---
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"

          # --- Naver 설정 ---
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

        provider:
          # --- Google Provider 설정 (스프링 시큐리티에 내장되어 있어 별도 설정 불필요) ---
          # --- Kakao Provider 설정 ---
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          # --- Naver Provider 설정 ---
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}
  servlet:
    multipart:
      max-request-size: 5MB
      max-file-size: 5MB

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-minutes: 30 # Access Token 유효 기간 (분)
  refresh-token-expiration-days: 7 # Refresh Token 유효 기간 (일)

# Swagger 설정
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json

# 로깅 설정 (Redis 연결 디버깅용)
logging:
  level:
    org.springframework.data.redis: DEBUG
    io.lettuce: DEBUG
    store.lastdance.security.AuthRedisService: DEBUG
    store.lastdance.security: DEBUG

# Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # Prometheus 엔드포인트 노출
  prometheus:
    metrics:
      export:
        enabled: true

gemini:
  api:
    key: ${GOOGLE_GEMINI_KEY}
