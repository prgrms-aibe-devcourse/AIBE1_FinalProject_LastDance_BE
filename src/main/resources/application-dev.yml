spring:
  jpa:
    hibernate:
      ddl-auto: create # 배포 시는 none 또는 validate 추천
    #      ddl-auto: update
    properties:
      hibernate:
        #        dialect: org.hibernate.dialect.MySQL8Dialect # MySQL
        dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL
        show_sql: true
        format_sql: true
  # 데이터소스
  datasource:
    #    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL
    driver-class-name: org.postgresql.Driver # PostgreSQL
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      # 개발 편의성을 위한 설정
      maximum-pool-size: 10         # 여유롭게 10개로 설정
      minimum-idle: 3               # 최소 3개 유지
      connection-timeout: 30000
      idle-timeout: 600000          # 10분
      max-lifetime: 1800000         # 30분

      # 개발 중 디버깅용
      leak-detection-threshold: 180000  # 3분으로 여유롭게

  security:
    oauth2:
      client:
        registration:
          # --- Google 설정 ---
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          # --- Kakao 설정 ---
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"

        provider:
          # --- Google Provider 설정 (스프링 시큐리티에 내장되어 있어 별도 설정 불필요) ---
          # --- Kakao Provider 설정 ---
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id