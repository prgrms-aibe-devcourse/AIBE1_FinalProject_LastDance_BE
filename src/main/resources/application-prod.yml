server:
  forward-headers-strategy: native
spring:
  jpa:
    hibernate:
      ddl-auto: none # 배포 시는 none 또는 validate 추천
    #      ddl-auto: update
    properties:
      hibernate:
        #        dialect: org.hibernate.dialect.MySQL8Dialect # MySQL
        dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL
        show_sql: false
        format_sql: false
  # 데이터소스
  datasource:
    #    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL
    driver-class-name: org.postgresql.Driver # PostgreSQL
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

      # 개발 중 디버깅용
      leak-detection-threshold: 180000  # 3분으로 여유롭게


  security:
    oauth2:
      client:
        registration:
          # --- Google 설정 ---
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

          # --- Kakao 설정 ---
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"

          # --- Naver 설정 ---
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

        provider:
          # --- Google Provider 설정 (스프링 시큐리티에 내장되어 있어 별도 설정 불필요) ---
          # --- Kakao Provider 설정 ---
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          # --- Naver Provider 설정 ---
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 30000          # 연결 타임아웃 30초
      lettuce:
        pool:
          max-active: 8
          max-wait: 30s     # 풀 대기시간 30초
        shutdown-timeout: 200ms

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}
  servlet:
    multipart:
      max-request-size: 15MB
      max-file-size: 10MB

  mail:
    # Gmail 설정
    gmail:
      protocol: smtp
      host: smtp.gmail.com
      port: 587
      username: ${GOOGLE_EMAIL}
      password: ${GOOGLE_MAIL_PASSWORD}
      default-encoding: utf-8
      properties:
        mail:
          smtp:
            starttls:
              enable: true
            auth: true

    # 네이버 설정
    naver:
      protocol: smtp
      host: smtp.naver.com
      port: 465  # 587 대신 465 시도
      username: ${NAVER_EMAIL}
      password: ${NAVER_MAIL_PASSWORD}
      default-encoding: utf-8
      properties:
        mail:
          smtp:
            ssl:
              enable: true  # SSL 사용
            auth: true

# JWT 설정
jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration-minutes: 30 # Access Token 유효 기간 (분)
  refresh-token-expiration-days: 7 # Refresh Token 유효 기간 (일)

logging:
  level:
    store.lastdance: WARN
    org.springframework.security: WARN
    org.springframework.data.redis: INFO

# Swagger 설정
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json

# Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # Prometheus 엔드포인트 노출
  prometheus:
    metrics:
      export:
        enabled: true

gemini:
  api:
    key: ${GOOGLE_GEMINI_KEY}

# 웹푸시 설정
webpush:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY}
    private-key: ${VAPID_PRIVATE_KEY}
    subject: ${VAPID_SUBJECT}

openapi:
  youth:
    api-key: ${YOUTH_API_KEY}